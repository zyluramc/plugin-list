<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugin Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      background: #0a0c14; 
      font-family: system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }
    
    .plugin-card {
      background: #111827;
      border: 1px solid #1f2937;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 2;
    }
    
    .plugin-card:hover {
      transform: translateY(-8px);
      border-color: #60a5fa;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .nav-tab {
      transition: all 0.2s ease;
    }
    .nav-tab:hover {
      background-color: #1f2937;
    }
    .tab-active {
      background-color: #1f2937;
      color: white;
      font-weight: 600;
    }

    .badge-free {
      background-color: #065f46;
      color: #6ee7b7;
      padding: 4px 16px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-premium {
      background-color: #78350f;
      color: #fcd34d;
      padding: 4px 16px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
    }
    canvas#snow{position:fixed;inset:0;pointer-events:none;z-index:1}
    @media(prefers-reduced-motion:reduce){
      canvas#snow{display:none}
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #060b14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-text {
      font-size: 1.2em;
      letter-spacing: 4px;
      margin-bottom: 25px;
      text-transform: uppercase;
      color: #fff;
    }
    .loading-bar {
      width: 260px;
      height: 4px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #ffffff;
      animation: loadFill 3s linear forwards;
    }
    @keyframes loadFill {
      from { width: 0%; }
      to { width: 100%; }
    }
    body.loading {
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #0a0c14; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #60a5fa, #818cf8);
      border-radius: 8px;
      border: 2px solid #0a0c14;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #93c5fd, #a5b4fc);
    }
    html {
      scrollbar-width: thin;
      scrollbar-color: #60a5fa #0a0c14;
    }
  </style>
</head>
<body class="min-h-screen text-slate-200 loading">
<div id="loading-screen">
  <div class="loading-text">Loading</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

  </nav>

    function createPluginCard(plugin) {
      const badge = plugin.premium 
        ? `<span class="badge-premium">Premium</span>`
        : `<span class="badge-free">Free</span>`;

      return `
        <div class="plugin-card rounded-3xl p-6">
          <div class="flex justify-between items-start mb-6">
            <h3 class="text-lg font-semibold text-white">${plugin.name}</h3>
            ${badge}
          </div>
          
          <a href="${plugin.url}" target="_blank"
             class="block w-full text-center bg-slate-800 hover:bg-slate-700 font-medium py-4 rounded-2xl transition-all text-sm">
            Open Plugin Page
          </a>
        </div>
      `;
    }

    function renderPlugins(pluginsToShow) {
      const grid = document.getElementById('pluginsGrid');
      grid.innerHTML = pluginsToShow.map(p => createPluginCard(p)).join('');
    }

    function filterPlugins() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      let filtered = [...allPlugins];

      if (currentTab === 1) filtered = filtered.filter(p => !p.premium);
      else if (currentTab === 2) filtered = filtered.filter(p => p.premium);
      else if (currentTab === 3) filtered = filtered.filter(p => lifestealPluginNames.has(p.name));
      else if (currentTab === 4) filtered = filtered.filter(p => survivalPluginNames.has(p.name));
      else if (currentTab === 5) filtered = filtered.filter(p => vanillaPluginNames.has(p.name));

      if (currentTab === 0) {
        filtered.sort((a, b) => a.name.localeCompare(b.name));
      } else if (currentTab === 3 || currentTab === 4 || currentTab === 5) {
        filtered.sort((a, b) => {
          if (a.premium !== b.premium) {
            return a.premium ? 1 : -1;
          }
          return a.name.localeCompare(b.name);
        });
      }

      if (searchTerm) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
      }

      renderPlugins(filtered);
    }

    function debouncedFilter() {
      clearTimeout(filterTimeout);
      filterTimeout = setTimeout(filterPlugins, 120);
    }

    function showTab(tabIndex) {
      currentTab = tabIndex;
      document.getElementById('searchInput').value = '';
      
      for (let i = 0; i < 6; i++) {
        const tab = document.getElementById(`tab${i}`);
        if (tab) tab.classList.toggle('tab-active', i === tabIndex);
      }
      filterPlugins();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) e.preventDefault();
    });

    window.onload = () => showTab(0);
  </script>

  <script>
  setTimeout(() => {
    const ls = document.getElementById('loading-screen');
    ls.classList.add('hidden');
    document.body.classList.remove('loading');
    setTimeout(() => ls.remove(), 500);
  }, 3000);
  </script>

  <script>
  (function(){
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const cv = document.getElementById('snow');
    if(reduced){ cv.remove(); return; }
    const ctx = cv.getContext('2d');
    let W,H,flakes=[];
    function size(){ W = cv.width = innerWidth; H = cv.height = innerHeight; }
    addEventListener('resize', size); size();
    for(let i=0;i<90;i++){
      flakes.push({
        x:Math.random()*W, y:Math.random()*H,
        r:.8+Math.random()*2.4,
        vy:.3+Math.random()*.8,
        drift:Math.random()*Math.PI*2,
        ds:.004+Math.random()*.01,
        o:.25+Math.random()*.55
      });
    }
    (function tick(){
      ctx.clearRect(0,0,W,H);
      for(const f of flakes){
        f.y += f.vy;
        f.drift += f.ds;
        f.x += Math.sin(f.drift)*.4;
        if(f.y > H+5){ f.y = -5; f.x = Math.random()*W; }
        ctx.beginPath();
        ctx.arc(f.x,f.y,f.r,0,7);
        ctx.fillStyle = `rgba(220,238,255,${f.o})`;
        ctx.fill();
      }
      requestAnimationFrame(tick);
    })();
  })();
  </script>
</body>
